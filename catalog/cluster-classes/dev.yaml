class_name: dev
environment: dev
azure_region: eastus
azure_cloud_environment: public
openshift_version: "4.18.18"
private_cluster: false
fips_enabled: false
use_azure_provided_domain: false
enable_acm_registration: false
enable_gitops_bootstrap: true
managed_identity:
  enabled: false
infrastructure:
  create_azure_resources: false
default_tags:
  managed_by: terraform
  workload: aro-classic
cluster:
  resource_group_name: aro-dev-aroclassic101
  dns_prefix: aroclassic101.dev.eastus.platform
  main_vm_size: Standard_D8s_v5
  worker_vm_size: Standard_D4s_v5
  worker_disk_size_gb: 128
  worker_node_count: 3
business_metadata:
  owner: platform-team
  cost_center: shared-services
  contact: platform-team@example.com
network:
  vnet_cidr: 10.90.0.0/22
  main_subnet_cidr: 10.90.1.0/24
  worker_subnet_cidr: 10.90.2.0/24
  pod_cidr: 10.128.0.0/14
  service_cidr: 172.30.0.0/16
  base_dns_zone_name: example.com
  base_dns_zone_resource_group: dns-core-rg
  dns_ttl: 300
  inbound_traffic_security_rules:
    - name: allow-https-from-cicd
      source_cidrs: 10.10.0.0/24
      target_cidrs: "*"
      source_port_range: "*"
      target_port_range: "443"
      protocol: Tcp
key_vault:
  name: kv-aro-dev-shared
  resource_group: rg-security-shared
  pull_secret_secret_name: aro-pull-secret
  cluster_details_secret_name: openshift-dev-aroclassic101-cluster-details
gitops:
  enabled: true
  overlay: cluster-applications
  repository_url: https://github.com/your-org/aro-classic-terraform.git
  target_revision: main
  root_app_path: gitops/overlays/cluster-applications
acm:
  hub_cluster_secret_name: openshift-dev-acmhub-cluster-details
