# Best practice for ARO:
# 1. Get one existing MachineSet from the cluster:
#      oc get machineset -n openshift-machine-api -o yaml
# 2. Copy one worker MachineSet into this file.
# 3. Change the name, labels, replicas, VM size, and zone for the new pool.
# 4. Keep the Azure provider fields that describe the cluster image and network,
#    then update only the parts that must be different for the new pool.
# 5. Add a MachineAutoscaler entry if you want this pool to scale.
#
# This example is a more realistic ARO starting point. It is commented out on
# purpose so the sample cluster does not create extra machine pools by default.
#
# Example:
# machineSets:
#   - apiVersion: machine.openshift.io/v1beta1
#     kind: MachineSet
#     metadata:
#       name: aroclassic210-extra-a-eastus1
#       namespace: openshift-machine-api
#       labels:
#         machine.openshift.io/cluster-api-cluster: aroclassic210
#       annotations:
#         machine.openshift.io/GPU: "0"
#     spec:
#       replicas: 1
#       selector:
#         matchLabels:
#           machine.openshift.io/cluster-api-cluster: aroclassic210
#           machine.openshift.io/cluster-api-machineset: aroclassic210-extra-a-eastus1
#       template:
#         metadata:
#           labels:
#             machine.openshift.io/cluster-api-cluster: aroclassic210
#             machine.openshift.io/cluster-api-machine-role: extra
#             machine.openshift.io/cluster-api-machine-type: extra
#             machine.openshift.io/cluster-api-machineset: aroclassic210-extra-a-eastus1
#             workload.platform/example: "true"
#         spec:
#           metadata:
#             labels:
#               node-role.kubernetes.io/worker: ""
#               workload.platform/example: "true"
#           taints: []
#           providerSpec:
#             value:
#               apiVersion: azureproviderconfig.openshift.io/v1beta1
#               kind: AzureMachineProviderSpec
#               acceleratedNetworking: true
#               credentialsSecret:
#                 name: azure-cloud-credentials
#                 namespace: openshift-machine-api
#               diagnostics:
#                 boot:
#                   storageAccountType: Managed
#               image:
#                 resourceID: /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/aro-dev-aroclassic210-resources/providers/Microsoft.Compute/images/rhcos-image
#               location: eastus
#               managedIdentity: aroclassic210-worker-user-assigned-identity
#               metadata:
#                 creationTimestamp: null
#               networkResourceGroup: aro-dev-aroclassic210
#               osDisk:
#                 diskSizeGB: 128
#                 managedDisk:
#                   storageAccountType: Premium_LRS
#                 osType: Linux
#               publicIP: false
#               publicLoadBalancer: aroclassic210
#               resourceGroup: aro-dev-aroclassic210-resources
#               secret:
#                 name: aroclassic210-worker-user-data
#                 namespace: openshift-machine-api
#               vmSize: Standard_D4s_v5
#               userDataSecret:
#                 name: worker-user-data
#               zone: "1"
#               subnet: worker
#               vnet: aro-vnet

# Notes:
# - The exact provider fields come from your cluster. Copy them from a real
#   MachineSet instead of guessing.
# - The safest things to change are usually:
#   - `metadata.name`
#   - `spec.replicas`
#   - machine set labels
#   - node labels and taints
#   - `vmSize`
#   - `zone`
# - Keep names in sync across:
#   - `metadata.name`
#   - `spec.selector.matchLabels.machine.openshift.io/cluster-api-machineset`
#   - `spec.template.metadata.labels.machine.openshift.io/cluster-api-machineset`

# Add one MachineAutoscaler per machine set if you want autoscaling.
# Example:
# machineAutoscalers:
#   - apiVersion: autoscaling.openshift.io/v1beta1
#     kind: MachineAutoscaler
#     metadata:
#       name: aroclassic210-extra-a
#       namespace: openshift-machine-api
#     spec:
#       minReplicas: 1
#       maxReplicas: 5
#       scaleTargetRef:
#         apiVersion: machine.openshift.io/v1beta1
#         kind: MachineSet
#         name: aroclassic210-extra-a-eastus1
#
# Notes:
# - `scaleTargetRef.name` must match the MachineSet name exactly.
# - The `ClusterAutoscaler` app must also be enabled for autoscaling to work.

machineSets: []
machineAutoscalers: []
