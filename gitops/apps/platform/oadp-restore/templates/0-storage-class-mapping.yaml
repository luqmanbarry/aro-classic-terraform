{{- if .Values.enable }}
{{- if eq .Values.clusterName "changeme" }}
{{- fail "oadp-restore requires a real clusterName before rendering." }}
{{- end }}
{{- if eq (len .Values.backups) 0 }}
{{- fail "oadp-restore requires at least one backup name when enable is true." }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: change-storage-class-config
  namespace: {{ .Values.namespace }}
  labels:
    velero.io/plugin-config: ""
    velero.io/change-storage-class: RestoreItemAction
  annotations:
    managed-by: argocd.argoproj.io
    # argocd.argoproj.io/sync-wave: "0"
    # "helm.sh/hook": ""
    "helm.sh/hook-weight": "0"
    argocd.argoproj.io/sync-options: "SkipDryRunOnMissingResource=true"
data:
  {{ toYaml .Values.storageClassMapping | nindent 2 }}
{{- end }}
