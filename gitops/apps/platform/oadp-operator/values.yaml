clusterName: changeme
keyVaultName: platform-secrets
namespace: openshift-adp
subscriptionChannel: stable-1.4
installPlanApproval: Automatic

veleroSecretKeyFile: cloud

defaultVolumesToFsBackup: true # Whether or not use snapshots ofr FileSystem Backup for Volumes
tagVolumeSnapshotClass: false

storage:
  provider: azure
  resourceGroup: changeme
  storageAccount: changeme
  storageAccountBlobURI: "https://changeme.blob.core.windows.net"
  volumeSnapshotClassName: changeme
  storageContainer: changeme
  subscriptionId: 00000000-0000-0000-0000-000000000000
  tenantID: 00000000-0000-0000-0000-000000000000
  clientID: 00000000-0000-0000-0000-000000000000
  clientSecretKVSecretName: changeme
  azureCloudName: AzurePublicCloud #AzureUSGovernmentCloud, AzureChinaCloud  
