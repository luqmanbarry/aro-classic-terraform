enabled: false
config:
  name: cluster
  external_secrets_namespace: external-secrets-operator
  refresh_interval: 1h
  cluster_secret_stores:
    - name: platform-secrets
      spec:
        provider:
          azurekv:
            tenantId: changeme
            vaultUrl: https://changeme.vault.azure.net
            authSecretRef:
              clientId:
                name: azure-key-vault-auth
                key: client-id
              clientSecret:
                name: azure-key-vault-auth
                key: client-secret
certManager:
  enabled: false
