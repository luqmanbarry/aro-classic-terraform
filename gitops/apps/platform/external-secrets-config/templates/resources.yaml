{{- $eso := .Values | default dict }}
{{- $config := $eso.config | default dict }}
{{- $certManager := .Values.certManager | default dict }}
{{- if $eso.enabled }}
{{- range $store := $config.cluster_secret_stores }}
{{- $azurekv := $store.spec.provider.azurekv | default dict }}
{{- if or (eq $azurekv.tenantId "changeme") (eq $azurekv.vaultUrl "https://changeme.vault.azure.net") }}
{{- fail "external-secrets-config requires real Azure Key Vault tenantId and vaultUrl values before rendering." }}
{{- end }}
{{- $authType := $azurekv.authType | default "" }}
{{- if and (ne $authType "WorkloadIdentity") (ne $authType "ServicePrincipal") }}
{{- fail "external-secrets-config authType must be WorkloadIdentity or ServicePrincipal." }}
{{- end }}
{{- if and (eq $authType "WorkloadIdentity") (eq (($azurekv.serviceAccountRef | default dict).name | default "") "") }}
{{- fail "external-secrets-config requires serviceAccountRef.name when authType is WorkloadIdentity." }}
{{- end }}
{{- $servicePrincipal := $azurekv.servicePrincipal | default dict }}
{{- if and (eq $authType "ServicePrincipal") (or (eq ($servicePrincipal.secretName | default "") "") (eq ($servicePrincipal.secretNamespace | default "") "") (eq ($servicePrincipal.clientIdKey | default "") "") (eq ($servicePrincipal.clientSecretKey | default "") "")) }}
{{- fail "external-secrets-config requires servicePrincipal secretName, secretNamespace, clientIdKey, and clientSecretKey when authType is ServicePrincipal." }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $config.external_secrets_namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "8"
---
apiVersion: operator.openshift.io/v1alpha1
kind: ExternalSecretsConfig
metadata:
  name: {{ $config.name }}
  labels:
    app.kubernetes.io/name: cluster
  annotations:
    argocd.argoproj.io/sync-wave: "9"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  controllerConfig:
    namespace: {{ $config.external_secrets_namespace }}
{{- if $certManager.enabled }}
  certManager:
    mode: Enabled
{{- end }}
  externalSecretsConfig:
    refreshInterval: {{ $config.refresh_interval | quote }}
---
{{- range $store := $config.cluster_secret_stores }}
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ $store.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
{{- $provider := ($store.spec.provider | default dict) }}
{{- $azurekv := ($provider.azurekv | default dict) }}
{{- $servicePrincipal := ($azurekv.servicePrincipal | default dict) }}
{{- if $azurekv }}
{{- $azurekvRendered := omit $azurekv "servicePrincipal" }}
{{- if eq $azurekv.authType "ServicePrincipal" }}
{{- $azurekvRendered = mergeOverwrite $azurekvRendered (dict "authSecretRef" (dict "clientId" (dict "name" ($servicePrincipal.secretName | default "") "namespace" ($servicePrincipal.secretNamespace | default "") "key" ($servicePrincipal.clientIdKey | default "")) "clientSecret" (dict "name" ($servicePrincipal.secretName | default "") "namespace" ($servicePrincipal.secretNamespace | default "") "key" ($servicePrincipal.clientSecretKey | default "")))) }}
{{- end }}
  provider:
    azurekv:
{{ toYaml $azurekvRendered | indent 6 }}
{{- else }}
{{ toYaml $store.spec | indent 2 }}
{{- end }}
---
{{- end }}
{{- end }}
