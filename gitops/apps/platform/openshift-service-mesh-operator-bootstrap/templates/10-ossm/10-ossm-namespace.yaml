{{- if eq (len .Values.tenants) 0 }}
{{- fail "openshift-service-mesh-operator-bootstrap requires at least one approved tenant before rendering." }}
{{- end }}
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    openshift.io/cluster-monitoring: "true"
  annotations:
    managed-by: argocd.argoproj.io
    # argocd.argoproj.io/sync-wave: "10"
    # "helm.sh/hook": ""
    "helm.sh/hook-weight": "10"
    argocd.argoproj.io/sync-options: "SkipDryRunOnMissingResource=true"
  name: {{ .Values.operators.servicemesh.namespace }}
