clusterName: changeme
keyVaultName: platform-secrets
# Operator configuration
operators:
  servicemesh:
    name: servicemeshoperator
    namespace: service-mesh-operator
    channel: stable
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Manual
    config:
      resources:
        limits:
          cpu: 1000m
          memory: 4Gi
      nodeSelector: {}
      tolerations: {}
  kiali:
    name: kiali-ossm
    namespace: kiali-operator
    channel: stable
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Manual
    config:
      resources:
        limits:
          cpu: 1000m
          memory: 4Gi
      nodeSelector: {}
      tolerations: {}
  otel:
    name: opentelemetry-product
    namespace: otel-operator
    channel: stable
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Manual
    config:
      resources:
        limits:
          cpu: 1000m
          memory: 4Gi
      nodeSelector: {}
      tolerations: {}
  tempo:
    name: tempo-product
    namespace: tempo-operator
    channel: stable
    source: redhat-operators
    sourceNamespace: openshift-marketplace
    installPlanApproval: Manual
    config:
      resources:
        limits:
          cpu: 1000m
          memory: 4Gi
      nodeSelector: {}
      tolerations: {}
    azureBlob:
      cloudName: AzurePublicCloud
      storageKVSecretName: changeme
      accountName: changeme
      containerName: changeme

# List of tenant namespaces and their SMCP configurations
tenants: []
