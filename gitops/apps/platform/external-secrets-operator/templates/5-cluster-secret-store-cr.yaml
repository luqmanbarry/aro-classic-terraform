{{- if or (eq .Values.provider.azurekv.tenantID "changeme") (eq .Values.provider.azurekv.vaultURL "https://my-keyvault-name.vault.azure.net") }}
{{- fail "external-secrets-operator requires real Azure Key Vault tenantID and vaultURL values before rendering." }}
{{- end }}
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: "{{ .Values.keyVaultName | lower }}"
  annotations:
    managed-by: argocd.argoproj.io
    # argocd.argoproj.io/sync-wave: "5"
    # "helm.sh/hook": ""
    "helm.sh/hook-weight": "5"
    argocd.argoproj.io/sync-options: "SkipDryRunOnMissingResource=true"
spec:
  provider:
    azurekv:
      environmentType: {{ .Values.provider.azurekv.environmentType }}
      tenantId: {{ .Values.provider.azurekv.tenantID }}
      vaultUrl: {{ .Values.provider.azurekv.vaultURL }}
      authSecretRef:
        clientId:
          name: {{ .Values.cluster_sp_k8s_secret_name }}
          namespace: {{ .Values.tf_resources_namespace }}
          key: client_id
        clientSecret:
          name: {{ .Values.cluster_sp_k8s_secret_name }}
          namespace: {{ .Values.tf_resources_namespace }}
          key: client_secret
