{{- if or (eq .Values.provider.azurekv.tenantID "changeme") (eq .Values.provider.azurekv.vaultURL "https://my-keyvault-name.vault.azure.net") }}
{{- fail "external-secrets-operator requires real Azure Key Vault tenantID and vaultURL values before rendering." }}
{{- end }}
{{- if and (ne .Values.provider.azurekv.authType "WorkloadIdentity") (ne .Values.provider.azurekv.authType "ServicePrincipal") }}
{{- fail "external-secrets-operator authType must be WorkloadIdentity or ServicePrincipal." }}
{{- end }}
{{- if and (eq .Values.provider.azurekv.authType "WorkloadIdentity") (eq .Values.provider.azurekv.serviceAccount.name "") }}
{{- fail "external-secrets-operator requires provider.azurekv.serviceAccount.name when authType is WorkloadIdentity." }}
{{- end }}
{{- if and (eq .Values.provider.azurekv.authType "ServicePrincipal") (or (eq .Values.provider.azurekv.servicePrincipal.secretName "") (eq .Values.provider.azurekv.servicePrincipal.secretNamespace "") (eq .Values.provider.azurekv.servicePrincipal.clientIdKey "") (eq .Values.provider.azurekv.servicePrincipal.clientSecretKey "")) }}
{{- fail "external-secrets-operator requires servicePrincipal secret name, namespace, clientIdKey, and clientSecretKey when authType is ServicePrincipal." }}
{{- end }}
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: "{{ .Values.keyVaultName | lower }}"
  annotations:
    managed-by: argocd.argoproj.io
    # argocd.argoproj.io/sync-wave: "5"
    # "helm.sh/hook": ""
    "helm.sh/hook-weight": "5"
    argocd.argoproj.io/sync-options: "SkipDryRunOnMissingResource=true"
spec:
  provider:
    azurekv:
      authType: {{ .Values.provider.azurekv.authType }}
      environmentType: {{ .Values.provider.azurekv.environmentType }}
      tenantId: {{ .Values.provider.azurekv.tenantID }}
      vaultUrl: {{ .Values.provider.azurekv.vaultURL }}
{{- if eq .Values.provider.azurekv.authType "WorkloadIdentity" }}
      serviceAccountRef:
        name: {{ .Values.provider.azurekv.serviceAccount.name }}
        namespace: {{ .Values.namespace }}
      authSecretRef:
        clientId:
          name: {{ .Values.bootstrapSecretName }}
          namespace: {{ .Values.bootstrapSecretNamespace }}
          key: client-id
        tenantId:
          name: {{ .Values.bootstrapSecretName }}
          namespace: {{ .Values.bootstrapSecretNamespace }}
          key: tenant-id
{{- else }}
      authSecretRef:
        clientId:
          name: {{ .Values.provider.azurekv.servicePrincipal.secretName }}
          namespace: {{ .Values.provider.azurekv.servicePrincipal.secretNamespace }}
          key: {{ .Values.provider.azurekv.servicePrincipal.clientIdKey }}
        clientSecret:
          name: {{ .Values.provider.azurekv.servicePrincipal.secretName }}
          namespace: {{ .Values.provider.azurekv.servicePrincipal.secretNamespace }}
          key: {{ .Values.provider.azurekv.servicePrincipal.clientSecretKey }}
{{- end }}
