{{- $shared := .Values.sharedTenantArgoCD | default dict }}
{{- $tenants := .Values.tenants | default list }}
{{- $instance := default (dict) $shared.instance }}
{{- $server := default (dict) $instance.server }}
{{- $controller := default (dict) $instance.controller }}
{{- $repo := default (dict) $instance.repo }}
{{- $redis := default (dict) $instance.redis }}
{{- $applicationSet := default (dict) $instance.applicationSet }}
{{- if $shared.enabled }}
{{- $enabledTenantCount := 0 }}
{{- range $tenant := $tenants }}
{{- if $tenant.enabled }}
{{- $enabledTenantCount = add1 $enabledTenantCount }}
{{- if eq (len ($tenant.namespaces | default list)) 0 }}
{{- fail "namespace-onboarding requires at least one namespace for each enabled tenant." }}
{{- end }}
{{- if eq (len ($tenant.source_repos | default list)) 0 }}
{{- fail "namespace-onboarding requires at least one source_repos entry for each enabled tenant." }}
{{- end }}
{{- end }}
{{- end }}
{{- if eq $enabledTenantCount 0 }}
{{- fail "namespace-onboarding requires at least one enabled tenant when sharedTenantArgoCD.enabled is true." }}
{{- end }}
{{- $applicationNamespaces := list }}
{{- $applicationSetNamespaces := list }}
{{- range $tenant := $tenants }}
{{- if $tenant.enabled }}
{{- range $namespace := $tenant.namespaces }}
{{- $applicationNamespaces = append $applicationNamespaces $namespace }}
{{- if $tenant.allow_application_sets }}
{{- $applicationSetNamespaces = append $applicationSetNamespaces $namespace }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
---
apiVersion: argoproj.io/v1alpha1
kind: ArgoCD
metadata:
  name: {{ $shared.instanceName }}
  namespace: {{ $shared.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "33"
spec:
  resourceTrackingMethod: annotation+label
  {{- with $server }}
  server:
    {{- with .route }}
    route:
{{ toYaml . | indent 6 }}
    {{- end }}
    {{- with .resources }}
    resources:
{{ toYaml . | indent 6 }}
    {{- end }}
  {{- end }}
  {{- with $controller.resources }}
  controller:
    resources:
{{ toYaml . | indent 6 }}
  {{- end }}
  {{- with $repo.resources }}
  repo:
    resources:
{{ toYaml . | indent 6 }}
  {{- end }}
  {{- with $redis.resources }}
  redis:
    resources:
{{ toYaml . | indent 6 }}
  {{- end }}
  {{- if $applicationNamespaces }}
  sourceNamespaces:
{{- range $namespace := uniq $applicationNamespaces }}
    - {{ $namespace }}
{{- end }}
  {{- else }}
  sourceNamespaces: []
  {{- end }}
  {{- if $applicationSetNamespaces }}
  applicationSet:
    {{- with $applicationSet.resources }}
    resources:
{{ toYaml . | indent 6 }}
    {{- end }}
    sourceNamespaces:
{{- range $namespace := uniq $applicationSetNamespaces }}
      - {{ $namespace }}
{{- end }}
  {{- end }}
{{- end }}
