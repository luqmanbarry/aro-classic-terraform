{{- range $ns := .Values.namespaces }}
{{- $featureAnnotations := include "namespace-onboarding.featureAnnotations" (dict "root" $ "namespace" $ns) | fromYaml | default dict }}
{{- $featureLabels := include "namespace-onboarding.featureLabels" (dict "root" $ "namespace" $ns) | fromYaml | default dict }}
{{- $annotations := merge $featureAnnotations ($ns.annotations | default dict) }}
{{- $labels := merge $featureLabels ($ns.labels | default dict) }}
---
apiVersion: project.openshift.io/v1
kind: Project
metadata:
  name: {{ $ns.name }}
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    {{- with $annotations }}
{{ toYaml . | indent 4 }}
    {{- end }}
  {{- with $labels }}
  labels:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  {{- if or $ns.displayName $ns.description $ns.nodeSelector }}
  {{- with $ns.displayName }}
  displayName: {{ . | quote }}
  {{- end }}
  {{- with $ns.description }}
  description: {{ . | quote }}
  {{- end }}
  {{- with $ns.nodeSelector }}
  nodeSelector: {{ . | quote }}
  {{- end }}
  {{- else }}
  {}
  {{- end }}
{{- end }}
